name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: email_generator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel packaging
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app/ --select E,F

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/email_generator_test
          JWT_SECRET_KEY: test-secret-key-for-ci-minimum-32-chars-long
          AI_PROVIDER: groq
          GROQ_API_KEY: test-key-not-used-in-unit-tests
          APP_ENV: development
          DEBUG: "false"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/integration || true
